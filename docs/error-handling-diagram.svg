<svg xmlns="http://www.w3.org/2000/svg" width="900" height="780" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="780" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">BFFConductor Error Handling</text>

  <!-- ══════════════ STARTUP SECTION ══════════════ -->
  <rect x="20" y="55" width="860" height="110" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="75" font-size="11" font-weight="bold" fill="#64748b" letter-spacing="1">STARTUP — AddBFFConductor()</text>

  <!-- error-mapping.json -->
  <rect x="60" y="85" width="180" height="68" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="150" y="106" text-anchor="middle" font-weight="bold" fill="#92400e">error-mapping.json</text>
  <text x="150" y="124" text-anchor="middle" font-size="11" fill="#78350f">"mappings": [ ... ]</text>
  <text x="150" y="140" text-anchor="middle" font-size="11" fill="#78350f">"exceptionMappings": [ ... ]</text>

  <!-- ErrorMappingRegistry -->
  <rect x="310" y="85" width="185" height="68" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="402" y="106" text-anchor="middle" font-weight="bold" fill="#1e40af">ErrorMappingRegistry</text>
  <text x="402" y="124" text-anchor="middle" font-size="11" fill="#1e40af">errorCode → HttpStatus,</text>
  <text x="402" y="140" text-anchor="middle" font-size="11" fill="#1e40af">DisplayMode, Headers</text>

  <!-- ExceptionMappingRegistry -->
  <rect x="560" y="85" width="210" height="68" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="665" y="106" text-anchor="middle" font-weight="bold" fill="#92400e">ExceptionMappingRegistry</text>
  <text x="665" y="124" text-anchor="middle" font-size="11" fill="#78350f">Type → HttpStatus, DisplayMode</text>
  <text x="665" y="140" text-anchor="middle" font-size="11" fill="#78350f">sorted most-derived-first</text>

  <!-- Arrows from JSON -->
  <line x1="241" y1="115" x2="308" y2="115" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="241" y1="132" x2="558" y2="132" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ══════════════ REQUEST PATH ══════════════ -->

  <!-- HTTP Request -->
  <rect x="350" y="205" width="200" height="44" rx="22" fill="#1e293b" stroke="none"/>
  <text x="450" y="232" text-anchor="middle" font-weight="bold" fill="white" font-size="14">HTTP Request</text>

  <!-- Arrow down to Controller -->
  <line x1="450" y1="249" x2="450" y2="283" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Controller Action -->
  <rect x="320" y="283" width="260" height="44" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" font-weight="bold" fill="#1e293b">Controller Action</text>

  <!-- Two paths out -->
  <!-- OperationResult path (left) -->
  <line x1="350" y1="327" x2="220" y2="375" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="255" y="358" font-size="11" fill="#2563eb" font-weight="bold">returns</text>
  <text x="242" y="371" font-size="11" fill="#2563eb" font-weight="bold">OperationResult</text>

  <!-- Exception path (right) -->
  <line x1="550" y1="327" x2="680" y2="375" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="598" y="358" font-size="11" fill="#d97706" font-weight="bold">throws</text>
  <text x="592" y="371" font-size="11" fill="#d97706" font-weight="bold">Exception</text>

  <!-- ══════════════ COMPOSITE FILTER BOX ══════════════ -->
  <rect x="45" y="385" width="810" height="230" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="7,3"/>
  <text x="65" y="407" font-size="11" font-weight="bold" fill="#15803d" letter-spacing="1">BffCompositeFilter  [UseBFFResponseFilter]</text>

  <!-- BffResponseFilter box -->
  <rect x="65" y="415" width="350" height="185" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="437" text-anchor="middle" font-weight="bold" fill="#1e40af">BffResponseFilter  (IActionFilter)</text>

  <rect x="85" y="447" width="310" height="38" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="240" y="464" text-anchor="middle" font-size="11" fill="#1e40af">1. Clone ErrorMappingRegistry dict</text>
  <text x="240" y="479" text-anchor="middle" font-size="11" fill="#1e40af">2. Apply [ErrorDisplay] controller attrs</text>

  <rect x="85" y="493" width="310" height="28" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="240" y="512" text-anchor="middle" font-size="11" fill="#1e40af">3. Apply [ErrorDisplay] action attrs</text>

  <rect x="85" y="529" width="310" height="28" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="240" y="548" text-anchor="middle" font-size="11" fill="#1e40af">4. Lookup first error code in resolved map</text>

  <text x="240" y="578" text-anchor="middle" font-size="10" fill="#6b7280">spec → controller attr → action attr  (most specific wins)</text>

  <!-- BffExceptionFilter box -->
  <rect x="485" y="415" width="355" height="185" rx="6" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="662" y="437" text-anchor="middle" font-weight="bold" fill="#92400e">BffExceptionFilter  (IExceptionFilter)</text>

  <rect x="505" y="447" width="315" height="38" rx="4" fill="#fde68a" stroke="#fbbf24" stroke-width="1"/>
  <text x="662" y="464" text-anchor="middle" font-size="11" fill="#78350f">1. Clone ExceptionMappingRegistry list</text>
  <text x="662" y="479" text-anchor="middle" font-size="11" fill="#78350f">2. Apply [ExceptionDisplay] controller attrs</text>

  <rect x="505" y="493" width="315" height="28" rx="4" fill="#fde68a" stroke="#fbbf24" stroke-width="1"/>
  <text x="662" y="512" text-anchor="middle" font-size="11" fill="#78350f">3. Apply [ExceptionDisplay] action attrs</text>

  <rect x="505" y="529" width="315" height="28" rx="4" fill="#fde68a" stroke="#fbbf24" stroke-width="1"/>
  <text x="662" y="548" text-anchor="middle" font-size="11" fill="#78350f">4. IsAssignableFrom match (most-derived first)</text>

  <text x="662" y="578" text-anchor="middle" font-size="10" fill="#6b7280">spec → controller attr → action attr  (most specific wins)</text>

  <!-- ══════════════ OUTPUT SECTION ══════════════ -->

  <!-- Success path arrow -->
  <line x1="160" y1="615" x2="160" y2="660" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Fail (OperationResult) arrow -->
  <line x1="320" y1="615" x2="320" y2="660" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Fail (Exception matched) arrow -->
  <line x1="600" y1="615" x2="600" y2="660" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- No match arrow -->
  <line x1="800" y1="615" x2="800" y2="660" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Success box -->
  <rect x="60" y="660" width="185" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="152" y="682" text-anchor="middle" font-weight="bold" fill="#15803d">HTTP 200</text>
  <text x="152" y="699" text-anchor="middle" font-size="11" fill="#166534">ApiResponse { success: true }</text>
  <text x="152" y="716" text-anchor="middle" font-size="11" fill="#166534">x-handle-message-as: [mode]</text>

  <!-- OperationResult Fail box -->
  <rect x="255" y="660" width="185" height="70" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="347" y="682" text-anchor="middle" font-weight="bold" fill="#dc2626">HTTP [from spec]</text>
  <text x="347" y="699" text-anchor="middle" font-size="11" fill="#991b1b">ApiResponse { success: false }</text>
  <text x="347" y="716" text-anchor="middle" font-size="11" fill="#991b1b">x-handle-message-as: [mode]</text>

  <!-- Exception matched fail box -->
  <rect x="510" y="660" width="185" height="70" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="602" y="682" text-anchor="middle" font-weight="bold" fill="#dc2626">HTTP [from spec]</text>
  <text x="602" y="699" text-anchor="middle" font-size="11" fill="#991b1b">ApiResponse { success: false }</text>
  <text x="602" y="716" text-anchor="middle" font-size="11" fill="#991b1b">x-handle-message-as: [mode]</text>

  <!-- No match box -->
  <rect x="715" y="660" width="165" height="70" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="797" y="682" text-anchor="middle" font-weight="bold" fill="#475569">Unhandled</text>
  <text x="797" y="699" text-anchor="middle" font-size="11" fill="#64748b">ASP.NET default</text>
  <text x="797" y="716" text-anchor="middle" font-size="11" fill="#64748b">exception handling</text>

  <!-- Labels on arrows above output boxes -->
  <text x="112" y="650" font-size="10" fill="#16a34a">success</text>
  <text x="264" y="650" font-size="10" fill="#dc2626">failure</text>
  <text x="547" y="650" font-size="10" fill="#dc2626">matched</text>
  <text x="758" y="650" font-size="10" fill="#94a3b8">no match</text>

</svg>
