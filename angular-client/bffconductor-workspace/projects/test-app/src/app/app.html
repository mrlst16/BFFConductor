<div class="container">
  <h1>BFF Conductor Test</h1>

  <div class="button-grid">
    <div class="row success-row">
      <button class="btn btn-success"
        (click)="send(successScenario.errorCode, successScenario.errorMessage)">
        {{ successScenario.label }}
      </button>
    </div>

    <div class="row error-row">
      @for (scenario of errorScenarios; track scenario.label) {
        <button class="btn btn-error"
          (click)="send(scenario.errorCode, scenario.errorMessage)">
          {{ scenario.label }}
          <span class="code">{{ scenario.errorCode }}</span>
        </button>
      }
    </div>
  </div>

  @if (result().kind === 'success') {
    <p class="result result--success">✓ Success</p>
  } @else if (result().kind === 'error') {
    @let r = result();
    @if (r.kind === 'error') {
      <p class="result result--error">✗ HTTP {{ r.status }} — see console</p>
    }
  }
</div>
